services:
  frontend:
    build:
      context: ./frontend
      target: prod
      args:
        - VITE_API_BASE_URL=/api
        - VITE_APP_NAME=${VITE_APP_NAME}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
    ports:
      - "80:80"
    environment:
      - DOMAIN_NAME=localhost
      - VITE_API_BASE_URL=/api
      - VITE_APP_NAME=${VITE_APP_NAME}
      - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
    # Tanpa volume SSL dan tanpa volume source code (karena ini simulasi prod)
